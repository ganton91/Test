      function resizeCanvas(canvas, context) {
        const ratio = window.devicePixelRatio || 1;
        const rect = canvas.getBoundingClientRect();
        canvas.width = Math.floor(rect.width * ratio);
        canvas.height = Math.floor(rect.height * ratio);
        context.setTransform(ratio, 0, 0, ratio, 0, 0);
        context.imageSmoothingEnabled = false;
      }

      function snapPixel(value) {
        return Math.round(value);
      }

      function resizeCanvases() {
        resizeCanvas(ui.staticCanvas, staticCtx);
        resizeCanvas(ui.sceneCanvas, sceneCtx);
        resizeCanvas(ui.contentCanvas, contentCtx);
        resizeCanvas(ui.overlayCanvas, overlayCtx);
        resizeCanvas(ui.rulerTop, rulerTopCtx);
        resizeCanvas(ui.rulerLeft, rulerLeftCtx);
        resizeCanvas(ui.rulerBottom, rulerBottomCtx);
        resizeCanvas(ui.rulerRight, rulerRightCtx);
        render({ ui: true, static: true, scenes: true, content: true, overlay: true, rulers: true });
      }

      function drawStaticScene() {
        const width = ui.staticCanvas.clientWidth;
        const height = ui.staticCanvas.clientHeight;
        staticCtx.clearRect(0, 0, width, height);

        const step = CELL_SIZE * state.viewport.zoom;
        if (step <= 1) return;

        const startX = state.viewport.x % step;
        const startY = state.viewport.y % step;

        for (let x = startX; x <= width; x += step) {
          const cellIndex = Math.round((x - state.viewport.x) / step);
          const major = cellIndex % CELLS_PER_METER === 0;
          const halfMeter = cellIndex % CELLS_PER_HALF_METER === 0;
          const strokeColor = major ? getCssVar("--grid-1m") : halfMeter ? getCssVar("--grid-50cm") : getCssVar("--grid-5cm");
          const lineWidth = major ? 0.56 : halfMeter ? 0.36 : 0.18;
          strokeSceneLine(staticCtx, x, 0, x, height, lineWidth, strokeColor, getCssVar("--grid-dual-stroke"));
        }

        for (let y = startY; y <= height; y += step) {
          const cellIndex = Math.round((y - state.viewport.y) / step);
          const major = cellIndex % CELLS_PER_METER === 0;
          const halfMeter = cellIndex % CELLS_PER_HALF_METER === 0;
          const strokeColor = major ? getCssVar("--grid-1m") : halfMeter ? getCssVar("--grid-50cm") : getCssVar("--grid-5cm");
          const lineWidth = major ? 0.56 : halfMeter ? 0.36 : 0.18;
          strokeSceneLine(staticCtx, 0, y, width, y, lineWidth, strokeColor, getCssVar("--grid-dual-stroke"));
        }

        staticCtx.save();
        strokeSceneLine(staticCtx, state.viewport.x, 0, state.viewport.x, height, 0.56, getCssVar("--crosshair"), getCssVar("--crosshair-dual-stroke"));
        strokeSceneLine(staticCtx, 0, state.viewport.y, width, state.viewport.y, 0.56, getCssVar("--crosshair"), getCssVar("--crosshair-dual-stroke"));
        staticCtx.restore();
      }

      function visibleTileBounds() {
        const cellSpan = CELL_SIZE * state.viewport.zoom;
        return {
          minTileX: Math.floor(Math.floor((-state.viewport.x) / cellSpan) / TILE_SIZE) - 1,
          maxTileX: Math.floor(Math.ceil((ui.contentCanvas.clientWidth - state.viewport.x) / cellSpan) / TILE_SIZE) + 1,
          minTileY: Math.floor(Math.floor((-state.viewport.y) / cellSpan) / TILE_SIZE) - 1,
          maxTileY: Math.floor(Math.ceil((ui.contentCanvas.clientHeight - state.viewport.y) / cellSpan) / TILE_SIZE) + 1,
        };
      }

      function drawSceneScene() {
        const width = ui.sceneCanvas.clientWidth;
        const height = ui.sceneCanvas.clientHeight;
        sceneCtx.clearRect(0, 0, width, height);

        [...state.scenes].reverse().forEach((scene) => {
          if (!scene.visible || !scene.image) return;
          const center = sceneCenter(scene);
          const screenCenter = worldToScreen(center.x, center.y);
          const drawWidth = Math.max(1, snapPixel(scene.width * state.viewport.zoom));
          const drawHeight = Math.max(1, snapPixel(scene.height * state.viewport.zoom));
          sceneCtx.save();
          sceneCtx.globalAlpha = scene.opacity;
          sceneCtx.translate(snapPixel(screenCenter.x), snapPixel(screenCenter.y));
          sceneCtx.rotate(scene.rotation || 0);
          sceneCtx.drawImage(scene.image, -drawWidth / 2, -drawHeight / 2, drawWidth, drawHeight);
          sceneCtx.restore();
        });
      }

      function drawContentScene() {
        const width = ui.contentCanvas.clientWidth;
        const height = ui.contentCanvas.clientHeight;
        const cellSpan = CELL_SIZE * state.viewport.zoom;
        const tileSpan = TILE_SIZE * cellSpan;
        const bounds = visibleTileBounds();
        contentCtx.clearRect(0, 0, width, height);

        [...state.layers].reverse().forEach((layer) => {
          if (!layer.visible) return;
          contentCtx.save();
          contentCtx.globalAlpha = layer.opacity;
          for (let tileY = bounds.minTileY; tileY <= bounds.maxTileY; tileY += 1) {
            for (let tileX = bounds.minTileX; tileX <= bounds.maxTileX; tileX += 1) {
              const tile = layer.tiles[tileKey(tileX, tileY)];
              if (!tile) continue;
              redrawTile(tile);
              const screenX = snapPixel(state.viewport.x + tileX * tileSpan);
              const screenY = snapPixel(state.viewport.y + tileY * tileSpan);
              const snappedTileSpan = Math.max(1, snapPixel(tileSpan));
              contentCtx.drawImage(tile.canvas, screenX, screenY, snappedTileSpan, snappedTileSpan);
            }
          }
          contentCtx.restore();
        });
      }

      function drawOverlayScene() {
        const width = ui.overlayCanvas.clientWidth;
        const height = ui.overlayCanvas.clientHeight;
        overlayCtx.clearRect(0, 0, width, height);

        const activeSceneEntity = activeScene();
        if (activeSceneEntity) {
          const calibration = state.sceneCalibration && state.sceneCalibration.sceneId === activeSceneEntity.id ? state.sceneCalibration : null;
          const handles = sceneHandleWorldPositions(activeSceneEntity);
          const corners = [handles.nw, handles.ne, handles.se, handles.sw];
          const screenCorners = corners.map((corner) => worldToScreen(corner.x, corner.y));

          overlayCtx.save();
          overlayCtx.strokeStyle = activeSceneEntity.locked ? getCssVar("--crosshair") : getCssVar("--selection");
          overlayCtx.lineWidth = activeSceneEntity.locked ? 1.5 : 1;
          overlayCtx.beginPath();
          overlayCtx.moveTo(screenCorners[0].x, screenCorners[0].y);
          screenCorners.slice(1).forEach((corner) => overlayCtx.lineTo(corner.x, corner.y));
          overlayCtx.closePath();
          overlayCtx.stroke();

          if (activeSceneEntity.locked) {
            overlayCtx.restore();
          } else if (calibration) {
            const points = calibration.points.map((point) => {
              const worldPoint = sceneWorldPoint(activeSceneEntity, point.localX, point.localY);
              return worldToScreen(worldPoint.x, worldPoint.y);
            });
            if (points.length === 2) {
              overlayCtx.beginPath();
              overlayCtx.moveTo(points[0].x, points[0].y);
              overlayCtx.lineTo(points[1].x, points[1].y);
              overlayCtx.stroke();
            }
            points.forEach((point) => {
              overlayCtx.fillStyle = getCssVar("--bg-strong");
              overlayCtx.strokeStyle = getCssVar("--selection");
              overlayCtx.beginPath();
              overlayCtx.arc(point.x, point.y, 4, 0, Math.PI * 2);
              overlayCtx.fill();
              overlayCtx.stroke();
            });
          } else {
            const rotateHandle = worldToScreen(handles.rotate.x, handles.rotate.y);
            const topCenter = worldToScreen((handles.nw.x + handles.ne.x) / 2, (handles.nw.y + handles.ne.y) / 2);

            overlayCtx.beginPath();
            overlayCtx.moveTo(topCenter.x, topCenter.y);
            overlayCtx.lineTo(rotateHandle.x, rotateHandle.y);
            overlayCtx.stroke();

            [...screenCorners, rotateHandle].forEach((handle, index) => {
              overlayCtx.fillStyle = index === 4 ? getCssVar("--crosshair") : getCssVar("--bg-strong");
              overlayCtx.strokeStyle = getCssVar("--selection");
              overlayCtx.beginPath();
              overlayCtx.arc(handle.x, handle.y, index === 4 ? 5 : 4, 0, Math.PI * 2);
              overlayCtx.fill();
              overlayCtx.stroke();
            });
          }
          overlayCtx.restore();
        }

        if (state.pointer.inside && state.activeTool === "select") {
          const pointer = worldFromClient(state.pointer.clientX, state.pointer.clientY);
          const scene = topSceneAt(pointer.worldX, pointer.worldY);
          if (scene) {
            const handles = sceneHandleWorldPositions(scene);
            const corners = [handles.nw, handles.ne, handles.se, handles.sw].map((corner) => worldToScreen(corner.x, corner.y));
            overlayCtx.save();
            overlayCtx.strokeStyle = getCssVar("--selection");
            overlayCtx.lineWidth = 1;
            overlayCtx.beginPath();
            overlayCtx.moveTo(corners[0].x, corners[0].y);
            corners.slice(1).forEach((corner) => overlayCtx.lineTo(corner.x, corner.y));
            overlayCtx.closePath();
            overlayCtx.stroke();
            overlayCtx.restore();
            return;
          }
          const layer = topPaintedLayerAt(pointer.worldX, pointer.worldY);
          if (layer) {
            const cell = cellFromWorld(pointer.worldX, pointer.worldY);
              const color = getCellColor(layer, cell.x, cell.y);
              if (color) {
                const size = CELL_SIZE * state.viewport.zoom;
                const x = snapPixel(state.viewport.x + cell.x * size);
                const y = snapPixel(state.viewport.y + cell.y * size);
                const snappedSize = Math.max(1, snapPixel(size));
                overlayCtx.save();
                overlayCtx.strokeStyle = getCssVar("--selection");
                overlayCtx.lineWidth = 1;
                overlayCtx.strokeRect(x + 0.5, y + 0.5, snappedSize - 1, snappedSize - 1);
                overlayCtx.restore();
              }
            }
        }

        if (state.pointer.inside && state.activeTool === "brush") {
          const pointer = worldFromClient(state.pointer.clientX, state.pointer.clientY);
          const cell = cellFromWorld(pointer.worldX, pointer.worldY);
          const origin = brushOriginFromCell(cell.x, cell.y);
          const size = CELL_SIZE * state.viewport.zoom;
          const x = snapPixel(state.viewport.x + origin.x * size);
          const y = snapPixel(state.viewport.y + origin.y * size);
          const snappedWidth = Math.max(1, snapPixel(state.brush.width * size));
          const snappedHeight = Math.max(1, snapPixel(state.brush.height * size));
          overlayCtx.save();
          overlayCtx.fillStyle = hexToRgba(state.brush.color, 0.18);
          overlayCtx.strokeStyle = hexToRgba(state.brush.color, 0.56);
          overlayCtx.fillRect(x, y, snappedWidth, snappedHeight);
          overlayCtx.strokeRect(x + 0.5, y + 0.5, snappedWidth - 1, snappedHeight - 1);
          overlayCtx.restore();
        }
      }

      function drawRulers() {
        const width = Math.round(ui.rulerTop.getBoundingClientRect().width);
        const height = Math.round(ui.rulerLeft.getBoundingClientRect().height);
        const topThickness = Math.round(ui.rulerTop.getBoundingClientRect().height);
        const leftThickness = Math.round(ui.rulerLeft.getBoundingClientRect().width);
        const bottomThickness = Math.round(ui.rulerBottom.getBoundingClientRect().height);
        const rightThickness = Math.round(ui.rulerRight.getBoundingClientRect().width);
        [rulerTopCtx, rulerLeftCtx, rulerBottomCtx, rulerRightCtx].forEach((context, index) => {
          const canvas = [ui.rulerTop, ui.rulerLeft, ui.rulerBottom, ui.rulerRight][index];
          const rect = canvas.getBoundingClientRect();
          context.clearRect(0, 0, rect.width, rect.height);
          context.fillStyle = getCssVar("--ruler-bg");
          context.fillRect(0, 0, rect.width, rect.height);
          context.lineWidth = 1;
          context.textBaseline = "middle";
        });

        const step = CELL_SIZE * state.viewport.zoom;
        if (step <= 1) return;
        const showCellLabels = step >= 28;
        const showHalfMeterLabels = step * CELLS_PER_METER >= 72;
        const topStart = state.viewport.x % step;
        const leftStart = state.viewport.y % step;

        for (let x = topStart; x <= width; x += step) {
          const cellIndex = Math.round((x - state.viewport.x) / step);
          const major = cellIndex % CELLS_PER_METER === 0;
          const halfMeter = cellIndex % CELLS_PER_HALF_METER === 0;
          drawHorizontalRulerMark(rulerTopCtx, x, cellIndex, major, halfMeter, false, showCellLabels, showHalfMeterLabels, topThickness);
          drawHorizontalRulerMark(rulerBottomCtx, x, cellIndex, major, halfMeter, true, showCellLabels, showHalfMeterLabels, bottomThickness);
        }

        for (let y = leftStart; y <= height; y += step) {
          const cellIndex = Math.round((y - state.viewport.y) / step);
          const major = cellIndex % CELLS_PER_METER === 0;
          const halfMeter = cellIndex % CELLS_PER_HALF_METER === 0;
          drawVerticalRulerMark(rulerLeftCtx, y, cellIndex, major, halfMeter, false, showCellLabels, showHalfMeterLabels, leftThickness);
          drawVerticalRulerMark(rulerRightCtx, y, cellIndex, major, halfMeter, true, showCellLabels, showHalfMeterLabels, rightThickness);
        }
      }

      function drawHorizontalRulerMark(context, x, cellIndex, major, halfMeter, invert, showCellLabels, showHalfMeterLabels, thickness) {
        const tick = major ? 7 : halfMeter ? 11 : 16;
        context.beginPath();
        context.moveTo(x + 0.5, invert ? 0 : thickness);
        context.lineTo(x + 0.5, invert ? thickness - tick : tick);
        context.strokeStyle = major ? getCssVar("--grid-1m") : halfMeter ? getCssVar("--grid-50cm") : getCssVar("--grid-5cm");
        context.lineWidth = major ? 0.56 : halfMeter ? 0.4 : 0.26;
        context.stroke();

        const label = major ? formatMeters(cellIndex) : formatCentimeters(cellIndex);
        const shouldLabel = major || (showHalfMeterLabels && halfMeter) || showCellLabels;
        if (!shouldLabel) return;
        context.fillStyle = getCssVar("--muted");
        context.font = major
          ? "600 10px IBM Plex Sans, Segoe UI, sans-serif"
          : showHalfMeterLabels && halfMeter
          ? "10px IBM Plex Sans, Segoe UI, sans-serif"
          : "9px IBM Plex Sans, Segoe UI, sans-serif";
        context.fillText(label, x + 4, invert ? thickness - 8 : 9);
      }

      function drawVerticalRulerMark(context, y, cellIndex, major, halfMeter, invert, showCellLabels, showHalfMeterLabels, thickness) {
        const signedCellIndex = -cellIndex;
        const tick = major ? 8 : halfMeter ? 11 : 16;
        context.beginPath();
        context.moveTo(invert ? 0 : thickness, y + 0.5);
        context.lineTo(invert ? thickness - tick : tick, y + 0.5);
        context.strokeStyle = major ? getCssVar("--grid-1m") : halfMeter ? getCssVar("--grid-50cm") : getCssVar("--grid-5cm");
        context.lineWidth = major ? 0.56 : halfMeter ? 0.4 : 0.26;
        context.stroke();

        const shouldLabel = major || (showHalfMeterLabels && halfMeter) || showCellLabels;
        if (!shouldLabel) return;
        context.save();
        const edgeOffset = invert ? thickness - 8 : 9;
        context.translate(edgeOffset, y);
        context.rotate(-Math.PI / 2);
        context.textAlign = "left";
        context.textBaseline = "middle";
        context.fillStyle = getCssVar("--muted");
        context.font = major
          ? "600 10px IBM Plex Sans, Segoe UI, sans-serif"
          : showHalfMeterLabels && halfMeter
          ? "10px IBM Plex Sans, Segoe UI, sans-serif"
          : "9px IBM Plex Sans, Segoe UI, sans-serif";
        context.fillText(major ? formatMeters(signedCellIndex) : formatCentimeters(signedCellIndex), 4, 0);
        context.restore();
      }

      function formatMeters(cellIndex) {
        const meters = cellIndex / CELLS_PER_METER;
        return meters.toFixed(Number.isInteger(meters) ? 0 : 1) + "m";
      }

      function formatCentimeters(cellIndex) {
        const totalCentimeters = cellIndex * CENTIMETERS_PER_CELL;
        const sign = Math.sign(totalCentimeters);
        const centimeters = Math.abs(totalCentimeters) % 100;
        if (centimeters === 0) return "";
        return (sign < 0 ? "-" : "") + centimeters + "cm";
      }

      function getCssVar(name) {
        return getComputedStyle(document.body).getPropertyValue(name).trim();
      }

      function hexToRgba(hex, alpha) {
        const clean = hex.replace("#", "");
        const value = clean.length === 3 ? clean.split("").map((char) => char + char).join("") : clean;
        const int = parseInt(value, 16);
        return "rgba(" + ((int >> 16) & 255) + ", " + ((int >> 8) & 255) + ", " + (int & 255) + ", " + alpha + ")";
      }

      function addLayer() {
        const layer = createLayer("Layer " + (state.layers.length + 1));
        state.layers.unshift(layer);
        setActiveLayerById(layer.id);
        setStatus("New layer added.");
        render({ ui: true, content: true, overlay: true });
      }

      function createSceneFromImage(file, image, previewUrl) {
        const visibleWorldWidth = ui.sceneCanvas.clientWidth / state.viewport.zoom;
        const visibleWorldHeight = ui.sceneCanvas.clientHeight / state.viewport.zoom;
        const scale = Math.min(
          1,
          (visibleWorldWidth * 0.65) / image.width || 1,
          (visibleWorldHeight * 0.65) / image.height || 1
        );
        const width = Math.max(CELL_SIZE, Math.round(image.width * scale));
        const height = Math.max(CELL_SIZE, Math.round(image.height * scale));
        const centerWorldX = (ui.sceneCanvas.clientWidth / 2 - state.viewport.x) / state.viewport.zoom;
        const centerWorldY = (ui.sceneCanvas.clientHeight / 2 - state.viewport.y) / state.viewport.zoom;

        return {
          id: "scene-" + Math.random().toString(36).slice(2, 10),
          name: "Default Scene " + state.nextSceneNumber++,
          previewUrl,
          image,
          visible: true,
          locked: false,
          opacity: 1,
          rotation: 0,
          x: Math.round(centerWorldX - width / 2),
          y: Math.round(centerWorldY - height / 2),
          width,
          height,
          dimensions: image.width + " x " + image.height,
        };
      }

      function importSceneFile(file) {
        if (!file || !file.type.startsWith("image/")) return;
        const previewUrl = URL.createObjectURL(file);
        const image = new Image();
        image.onload = () => {
          const scene = createSceneFromImage(file, image, previewUrl);
          state.scenes.unshift(scene);
          setActiveSceneById(scene.id);
          setStatus("Imported scene image.");
          render({ ui: true, scenes: true, overlay: true });
        };
        image.src = previewUrl;
      }

      function paintCells(cellX, cellY, mode) {
        const layer = activeLayer();
        if (!layer) return false;
        const origin = brushOriginFromCell(cellX, cellY);
        let changed = false;
        for (let y = 0; y < state.brush.height; y += 1) {
          for (let x = 0; x < state.brush.width; x += 1) {
            changed = setCellColor(layer, origin.x + x, origin.y + y, mode === "paint" ? state.brush.color : null) || changed;
          }
        }
        return changed;
      }

      function topPaintedLayerAt(worldX, worldY) {
        const cell = cellFromWorld(worldX, worldY);
        for (const layer of state.layers) {
          if (!layer.visible) continue;
          if (getCellColor(layer, cell.x, cell.y)) return layer;
        }
        return null;
      }

      function beginPan(clientX, clientY) {
        state.interaction = {
          type: "pan",
          originX: clientX,
          originY: clientY,
          startX: state.viewport.x,
          startY: state.viewport.y,
        };
        setStatus("Panning canvas.");
      }

      function beginBrush(clientX, clientY, mode) {
        const pointer = worldFromClient(clientX, clientY);
        const cell = cellFromWorld(pointer.worldX, pointer.worldY);
        if (!activeLayer()) return;
        state.interaction = {
          type: "brush",
          mode,
          lastKey: "",
        };
        const changed = paintCells(cell.x, cell.y, mode);
        state.interaction.lastKey = cell.x + ":" + cell.y + ":" + mode;
        setStatus(mode === "paint" ? "Painting active layer." : "Erasing from active layer.");
        render({ ui: changed, content: true, overlay: true });
      }

      function beginSelection(clientX, clientY) {
        const pointer = worldFromClient(clientX, clientY);
        const scene = topSceneAt(pointer.worldX, pointer.worldY);
        if (scene) {
          setActiveSceneById(scene.id);
          setStatus(scene.locked ? "Locked scene selected." : "Transform active on selected scene.");
          render({ ui: true, overlay: true });
          return;
        }
        const layer = topPaintedLayerAt(pointer.worldX, pointer.worldY);
        if (layer) {
          setActiveLayerById(layer.id);
          setStatus("Brush active on selected layer.");
          render({ ui: true, overlay: true });
          return;
        }
        clearActiveTarget();
        setStatus("No painted cell here. Selection stays idle.");
        render({ ui: true, overlay: true });
      }

      function beginSceneTransform(clientX, clientY) {
        const scene = activeScene();
        if (!scene) {
          clearActiveTarget();
          render({ ui: true, overlay: true });
          return;
        }
        if (scene.locked) {
          setStatus("Scene is locked.");
          render({ ui: true, overlay: true });
          return;
        }
        const pointer = worldFromClient(clientX, clientY);
        const hit = sceneTransformHit(scene, pointer.worldX, pointer.worldY);
        if (!hit) {
          clearActiveTarget();
          setStatus("Selection tool active.");
          render({ ui: true, overlay: true });
          return;
        }

        const center = sceneCenter(scene);
        const localPointer = sceneLocalPoint(scene, pointer.worldX, pointer.worldY);
        const anchorMap = {
          nw: { x: scene.width / 2, y: scene.height / 2 },
          ne: { x: -scene.width / 2, y: scene.height / 2 },
          se: { x: -scene.width / 2, y: -scene.height / 2 },
          sw: { x: scene.width / 2, y: -scene.height / 2 },
        };

        state.interaction = {
          type: hit.type,
          sceneId: scene.id,
          handle: hit.handle,
          startX: scene.x,
          startY: scene.y,
          startWidth: scene.width,
          startHeight: scene.height,
          startRotation: scene.rotation || 0,
          startCenterX: center.x,
          startCenterY: center.y,
          pointerWorldX: pointer.worldX,
          pointerWorldY: pointer.worldY,
          localPointerX: localPointer.x,
          localPointerY: localPointer.y,
          anchorLocal: hit.type === "scale" ? anchorMap[hit.handle] : null,
          rotateStartAngle: hit.type === "rotate" ? Math.atan2(pointer.worldY - center.y, pointer.worldX - center.x) : 0,
        };
        setStatus(
          hit.type === "move"
            ? "Moving active scene."
            : hit.type === "scale"
            ? "Scaling active scene."
            : "Rotating active scene."
        );
      }

      function handlePointerDown(event) {
        const isRightClick = event.button === 2;
        if (state.spacePan || event.button === 1) {
          beginPan(event.clientX, event.clientY);
          return;
        }
        if (state.sceneCalibration && !isRightClick) {
          collectSceneCalibrationPoint(event.clientX, event.clientY);
          return;
        }
        if (state.activeTool === "select" && !isRightClick) {
          beginSelection(event.clientX, event.clientY);
          return;
        }
        if (state.activeTool === "transform" && !isRightClick) {
          beginSceneTransform(event.clientX, event.clientY);
          return;
        }
        beginBrush(event.clientX, event.clientY, isRightClick ? "erase" : "paint");
      }

      function handlePointerMove(event) {
        state.pointer.clientX = event.clientX;
        state.pointer.clientY = event.clientY;
        state.pointer.inside = true;

        if (!state.interaction) {
          if (state.sceneCalibration && activeScene()) {
            ui.overlayCanvas.style.cursor = "crosshair";
          } else if (state.activeTool === "transform" && activeScene() && !activeScene().locked) {
            const pointer = worldFromClient(event.clientX, event.clientY);
            ui.overlayCanvas.style.cursor = cursorForSceneHit(sceneTransformHit(activeScene(), pointer.worldX, pointer.worldY));
          } else if (state.activeTool === "brush") {
            ui.overlayCanvas.style.cursor = "crosshair";
          } else {
            ui.overlayCanvas.style.cursor = "default";
          }
          render({ overlay: true });
          return;
        }

        if (state.interaction.type === "pan") {
          state.viewport.x = state.interaction.startX + (event.clientX - state.interaction.originX);
          state.viewport.y = state.interaction.startY + (event.clientY - state.interaction.originY);
          render({ static: true, scenes: true, content: true, overlay: true, rulers: true });
          return;
        }

        if (state.interaction.type === "brush") {
          const pointer = worldFromClient(event.clientX, event.clientY);
          const cell = cellFromWorld(pointer.worldX, pointer.worldY);
          const key = cell.x + ":" + cell.y + ":" + state.interaction.mode;
          if (key !== state.interaction.lastKey) {
            const changed = paintCells(cell.x, cell.y, state.interaction.mode);
            state.interaction.lastKey = key;
            render({ ui: changed, content: true, overlay: true });
          }
          return;
        }

        if (state.interaction.sceneId) {
          const scene = state.scenes.find((entry) => entry.id === state.interaction.sceneId);
          if (!scene) return;
          const pointer = worldFromClient(event.clientX, event.clientY);

          if (state.interaction.type === "move") {
            scene.x = state.interaction.startX + (pointer.worldX - state.interaction.pointerWorldX);
            scene.y = state.interaction.startY + (pointer.worldY - state.interaction.pointerWorldY);
            render({ scenes: true, overlay: true });
            return;
          }

          if (state.interaction.type === "rotate") {
            const currentAngle = Math.atan2(pointer.worldY - state.interaction.startCenterY, pointer.worldX - state.interaction.startCenterX);
            scene.rotation = snapAngleToQuarterTurn(
              state.interaction.startRotation + currentAngle - state.interaction.rotateStartAngle
            );
            render({ scenes: true, overlay: true });
            return;
          }

          if (state.interaction.type === "scale") {
            const localPointer = rotatePoint(
              pointer.worldX - state.interaction.startCenterX,
              pointer.worldY - state.interaction.startCenterY,
              -state.interaction.startRotation
            );
            const anchor = state.interaction.anchorLocal;
            const startAspectRatio = state.interaction.startWidth / Math.max(CELL_SIZE, state.interaction.startHeight);
            const rawWidth = Math.abs(localPointer.x - anchor.x);
            const rawHeight = Math.abs(localPointer.y - anchor.y);
            const proposedWidthFromHeight = rawHeight * startAspectRatio;
            const proposedHeightFromWidth = rawWidth / startAspectRatio;
            const useWidthDriver = rawWidth >= proposedWidthFromHeight;
            const width = Math.max(CELL_SIZE, useWidthDriver ? rawWidth : proposedWidthFromHeight);
            const height = Math.max(CELL_SIZE, useWidthDriver ? proposedHeightFromWidth : rawHeight);
            const centerLocal = {
              x: anchor.x + Math.sign(localPointer.x - anchor.x || 1) * width / 2,
              y: anchor.y + Math.sign(localPointer.y - anchor.y || 1) * height / 2,
            };
            const worldCenterOffset = rotatePoint(centerLocal.x, centerLocal.y, state.interaction.startRotation);
            const centerWorld = {
              x: state.interaction.startCenterX + worldCenterOffset.x,
              y: state.interaction.startCenterY + worldCenterOffset.y,
            };
            scene.width = width;
            scene.height = height;
            scene.x = centerWorld.x - width / 2;
            scene.y = centerWorld.y - height / 2;
            render({ scenes: true, overlay: true });
          }
        }
      }

      function handlePointerUp() {
        if (!state.interaction) return;
        if (state.interaction.type === "pan") setStatus("Viewport updated.");
        if (state.interaction.sceneId) setStatus("Scene transform updated.");
        state.interaction = null;
        render({ ui: true, overlay: true });
      }

      function handleWheel(event) {
        event.preventDefault();
        const pointer = worldFromClient(event.clientX, event.clientY);
        const nextZoom = event.deltaY < 0 ? state.viewport.zoom * 1.08 : state.viewport.zoom / 1.08;
        const clamped = Math.min(MAX_ZOOM, Math.max(MIN_ZOOM, nextZoom));
        state.viewport.x = pointer.screenX - pointer.worldX * clamped;
        state.viewport.y = pointer.screenY - pointer.worldY * clamped;
        state.viewport.zoom = clamped;
        setStatus("Zoom " + Math.round(clamped * 100) + "%");
        render({ static: true, scenes: true, content: true, overlay: true, rulers: true });
      }

      function activateTool(tool) {
        if (tool === "select") {
          clearActiveTarget();
        } else if (tool === "brush") {
          if (!activeLayer() && state.layers[0]) {
            setActiveLayerById(state.layers[0].id);
          } else {
            state.activeSceneId = null;
            state.activeTool = "brush";
          }
        }
        state.activeTool = tool;
        setStatus(
          tool === "select" ? "Selection tool active." : tool === "brush" ? "Brush tool active." : "Transform tool active."
        );
        render({ ui: true, overlay: true });
      }

      ui.selectionToolButton.addEventListener("click", () => activateTool("select"));
      ui.brushToolButton.addEventListener("click", () => activateTool("brush"));
      ui.brushColor.addEventListener("input", () => {
        state.brush.color = ui.brushColor.value;
        render({ ui: true, overlay: true });
      });
      ui.brushWidth.addEventListener("input", () => {
        state.brush.width = Math.max(1, Number(ui.brushWidth.value) || 1);
        render({ ui: true, overlay: true });
      });
      ui.brushHeight.addEventListener("input", () => {
        state.brush.height = Math.max(1, Number(ui.brushHeight.value) || 1);
        render({ ui: true, overlay: true });
      });

      ui.sizeChips.forEach((chip) => {
        chip.addEventListener("click", () => {
          const [width, height] = chip.dataset.size.split("x").map(Number);
          state.brush.width = width;
          state.brush.height = height;
          render({ ui: true, overlay: true });
        });
      });

      ui.sceneAddButton.addEventListener("click", () => {
        ui.sceneImportInput.value = "";
        ui.sceneImportInput.click();
      });
      ui.sceneImportInput.addEventListener("change", () => {
        const [file] = ui.sceneImportInput.files || [];
        importSceneFile(file);
      });
      ui.addLayerButton.addEventListener("click", addLayer);
      ui.sceneScaleCancelButton.addEventListener("click", () => {
        closeModal(ui.sceneScaleModal);
        cancelSceneCalibration();
        setStatus("Scene scale setup cancelled.");
        render({ overlay: true });
      });
      ui.sceneScaleApplyButton.addEventListener("click", applySceneCalibration);
      ui.sceneScaleMeters.addEventListener("keydown", (event) => {
        if (event.key === "Enter") {
          event.preventDefault();
          applySceneCalibration();
        }
      });

      ui.settingsButton.addEventListener("click", () => toggleModal(ui.settingsMenu));

      ui.themeButtons.forEach((button) => {
        button.addEventListener("click", () => {
          state.theme = button.dataset.theme;
          setStatus((state.theme === "dark" ? "Dark" : "Light") + " mode active.");
          render({ ui: true, static: true, scenes: true, content: true, overlay: true, rulers: true });
        });
      });

      ui.gridPositionButtons.forEach((button) => {
        button.addEventListener("click", () => {
          state.gridPosition = button.dataset.gridPosition;
          setStatus(state.gridPosition === "above" ? "Grid shown above layers." : "Grid shown below layers.");
          render({ ui: true });
        });
      });

      ui.dualGridButtons.forEach((button) => {
        button.addEventListener("click", () => {
          state.dualStrokeGrid = button.dataset.dualGrid === "on";
          setStatus(state.dualStrokeGrid ? "Dual stroke grid enabled." : "Dual stroke grid disabled.");
          render({ ui: true, static: true });
        });
      });

      document.addEventListener(
        "pointerdown",
        (event) => {
          if (!isEditingName()) return;
          if (event.target.closest(".layer-name")) return;
          cancelRenameMode();
          event.preventDefault();
          event.stopPropagation();
        },
        true
      );

      ui.modalBackdrop.addEventListener("click", () => {
        closeActiveModal();
      });

      ui.overlayCanvas.addEventListener("contextmenu", (event) => event.preventDefault());
      ui.overlayCanvas.addEventListener("pointerdown", handlePointerDown);
      ui.overlayCanvas.addEventListener("pointermove", handlePointerMove);
      ui.overlayCanvas.addEventListener("pointerleave", () => {
        state.pointer.inside = false;
        render({ overlay: true });
      });
      ui.overlayCanvas.addEventListener("pointerup", handlePointerUp);
      ui.overlayCanvas.addEventListener("pointercancel", handlePointerUp);
      ui.overlayCanvas.addEventListener("wheel", handleWheel, { passive: false });
      window.addEventListener("pointerup", handlePointerUp);

      window.addEventListener("keydown", (event) => {
        if (event.key === "Escape" && closeActiveModal()) {
          return;
        }
        if (event.code === "Space") state.spacePan = true;
        if (event.key === "Escape") {
          clearActiveTarget();
          setStatus("Selection tool active.");
          render({ ui: true, overlay: true });
        }
      });
      window.addEventListener("keyup", (event) => {
        if (event.code === "Space") state.spacePan = false;
      });
      window.addEventListener("resize", resizeCanvases);

      resizeCanvases();
      render();
    </script>
  </body>
</html>
