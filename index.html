<!DOCTYPE html>
<html lang="el">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>millimétré</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f5f4f1;
        --bg-elevated: rgba(255, 255, 255, 0.82);
        --bg-strong: #ffffff;
        --surface: rgba(255, 255, 255, 0.7);
        --surface-strong: rgba(255, 255, 255, 0.95);
        --floating-surface: #ffffff;
        --floating-surface-strong: #f6f5f2;
        --floating-panel: #ffffff;
        --line: rgba(20, 24, 28, 0.1);
        --line-strong: rgba(20, 24, 28, 0.18);
        --text: #161b21;
        --muted: #67707a;
        --accent: #111827;
        --accent-soft: rgba(17, 24, 39, 0.08);
        --canvas-bg: #fcfcfb;
        --ruler-bg: rgba(248, 248, 246, 0.95);
        --grid-5cm: rgb(20, 24, 28);
        --grid-50cm: rgb(20, 24, 28);
        --grid-1m: rgb(20, 24, 28);
        --crosshair: rgb(210, 45, 78);
        --selection: rgba(17, 24, 39, 0.82);
        --grid-dual-stroke: #fcfcfb;
        --crosshair-dual-stroke: #fcfcfb;
        --shadow: 0 18px 48px rgba(17, 24, 39, 0.08);
      }

      body.theme-dark {
        color-scheme: dark;
        --bg: #101316;
        --bg-elevated: rgba(20, 24, 28, 0.82);
        --bg-strong: #171b20;
        --surface: rgba(24, 29, 35, 0.8);
        --surface-strong: rgba(26, 31, 37, 0.94);
        --floating-surface: #1a2026;
        --floating-surface-strong: #232a31;
        --floating-panel: #171d23;
        --line: rgba(255, 255, 255, 0.08);
        --line-strong: rgba(255, 255, 255, 0.16);
        --text: #edf1f7;
        --muted: #98a4b3;
        --accent: #f8fafc;
        --accent-soft: rgba(248, 250, 252, 0.08);
        --canvas-bg: #11161a;
        --ruler-bg: rgba(20, 24, 28, 0.96);
        --grid-5cm: rgb(255, 255, 255);
        --grid-50cm: rgb(255, 255, 255);
        --grid-1m: rgb(255, 255, 255);
        --crosshair: rgb(255, 111, 145);
        --selection: rgba(255, 255, 255, 0.86);
        --grid-dual-stroke: #11161a;
        --crosshair-dual-stroke: #11161a;
        --shadow: 0 20px 56px rgba(0, 0, 0, 0.32);
      }

      * {
        box-sizing: border-box;
      }

      button:focus {
        outline: none;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
        overflow: hidden;
        background:
          radial-gradient(circle at top, rgba(255, 255, 255, 0.32), transparent 28%),
          linear-gradient(180deg, var(--bg), color-mix(in srgb, var(--bg) 86%, black 4%));
        color: var(--text);
        font-family: "IBM Plex Sans", "Segoe UI", sans-serif;
      }

      button,
      input {
        font: inherit;
      }

      button {
        color: inherit;
      }

      .app {
        display: grid;
        grid-template-rows: 48px 1fr;
        height: 100vh;
      }

      .topbar {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 8px 12px;
        border-bottom: 1px solid var(--line);
        background: var(--bg-elevated);
        backdrop-filter: blur(18px);
      }

      .brand {
        display: flex;
        align-items: center;
        min-width: max-content;
      }

      .brand-name {
        font-size: 14px;
        font-weight: 600;
        letter-spacing: 0.01em;
      }

      .separator {
        width: 1px;
        height: 16px;
        background: var(--line-strong);
      }

      .toolbar-actions {
        display: flex;
        gap: 6px;
      }

      .ghost-button,
      .layer-icon,
      .mode-button,
      .floating-tool,
      .tool-chip,
      .add-layer {
        border: 1px solid var(--line);
        background: var(--surface);
        color: inherit;
        border-radius: 12px;
        cursor: pointer;
        transition: 140ms ease;
      }

      .ghost-button:hover,
      .layer-icon:hover,
      .mode-button:hover,
      .floating-tool:hover,
      .tool-chip:hover,
      .add-layer:hover {
        background: var(--surface-strong);
        border-color: var(--line-strong);
      }

      .ghost-button {
        padding: 6px 10px;
        font-size: 11px;
      }

      .ghost-button.stub {
        opacity: 0.82;
      }

      .ghost-button.active {
        background: var(--accent-soft);
        border-color: var(--line-strong);
      }

      .workspace {
        position: relative;
        overflow: hidden;
        display: grid;
        grid-template-columns: auto 1fr;
        min-height: 0;
      }

      .layers-panel {
        position: relative;
        top: auto;
        left: auto;
        bottom: auto;
        width: 280px;
        height: 100%;
        display: flex;
        flex-direction: column;
        min-height: 0;
        overflow: hidden;
        border-right: 1px solid var(--line);
        border-bottom: 0;
        border-left: 0;
        border-top: 0;
        border-radius: 0;
        background: var(--bg-elevated);
        backdrop-filter: blur(18px);
        box-shadow: none;
        z-index: 10;
        transition: width 180ms ease;
      }

      .layers-panel.collapsed {
        width: 54px;
      }

      .section-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        min-height: 32px;
        padding: 6px 9px;
      }

      .section-header-title {
        font-size: 12px;
        font-weight: 600;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        color: var(--muted);
      }

      .section-header-action {
        width: 26px;
        height: 26px;
        display: grid;
        place-items: center;
        position: relative;
        padding: 0;
        border-radius: 8px;
        border: 1px solid var(--line);
        background: var(--surface);
        cursor: pointer;
        color: inherit;
      }

      .section-header-action::before,
      .section-header-action::after {
        content: "";
        position: absolute;
        left: 50%;
        top: 50%;
        width: 10px;
        height: 1px;
        border-radius: 999px;
        background: currentColor;
        transform: translate(-50%, -50%);
      }

      .section-header-action::after {
        width: 1px;
        height: 10px;
      }

      .layers-body {
        flex: 1;
        display: flex;
        flex-direction: column;
        gap: 10px;
        padding: 12px;
        min-height: 0;
        overflow-y: auto;
        overflow-x: hidden;
        scrollbar-width: none;
      }

      .layers-body::-webkit-scrollbar {
        display: none;
      }

      .layers-panel.collapsed .layers-body {
        display: none;
      }

      .panel-section {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .panel-section.compact-empty {
        gap: 0;
      }

      .section-header-left {
        min-width: 0;
      }

      .scene-list,
      .layer-list {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .scene-details,
      .empty-state {
        margin-top: 4px;
        font-size: 11px;
        color: var(--muted);
      }

      .empty-state {
        padding: 2px 0 4px;
      }

      .layer-list {
        flex: 0 0 auto;
        padding-right: 2px;
      }

      .layer-card {
        display: grid;
        grid-template-columns: 16px minmax(0, 1fr) auto;
        align-items: center;
        gap: 8px;
        padding: 10px;
        border-radius: 14px;
        border: 1px solid var(--line);
        background: var(--surface);
      }

      .scene-card {
        grid-template-columns: 16px minmax(0, 1fr);
        align-items: start;
      }

      .layer-stack-card {
        grid-template-columns: 16px minmax(0, 1fr);
        align-items: start;
      }

      .layer-card.active {
        background: var(--accent-soft);
        border-color: var(--line-strong);
      }

      .layer-card.dragging {
        opacity: 0.55;
      }

      .drag-handle {
        cursor: grab;
        font-size: 14px;
        color: var(--muted);
        text-align: center;
        user-select: none;
      }

      .layer-main {
        min-width: 0;
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        gap: 8px;
      }

      .layer-name {
        width: auto;
        max-width: 100%;
        display: inline-block;
        padding: 0;
        border: 0;
        background: transparent;
        color: inherit;
        font-size: 12px;
        font-weight: 600;
      }

      .layer-name:focus {
        outline: none;
      }

      .layer-name-label {
        width: auto;
        max-width: 100%;
        display: inline-block;
        font-size: 12px;
        font-weight: 600;
        color: inherit;
        line-height: 1.35;
        cursor: default;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .layer-meta {
        font-size: 11px;
        color: var(--muted);
      }

      .layer-actions {
        display: flex;
        align-items: center;
        gap: 6px;
      }

      .layer-icon {
        width: 26px;
        height: 26px;
        display: grid;
        place-items: center;
        padding: 0;
        border-radius: 9px;
        font-size: 12px;
      }

      .layer-footer {
        font-size: 11px;
        color: var(--muted);
        line-height: 1.45;
      }

      .canvas-shell {
        position: relative;
        min-width: 0;
        min-height: 0;
      }

      .ruler-corner,
      .ruler-corner-top-right,
      .ruler-corner-bottom-left,
      .ruler-top,
      .ruler-left,
      .ruler-bottom,
      .ruler-right,
      .ruler-corner-bottom-right {
        position: absolute;
        background: var(--ruler-bg);
        border-color: var(--line);
        z-index: 2;
      }

      .ruler-corner {
        top: 0;
        left: 0;
        width: 28px;
        height: 28px;
        background: var(--ruler-bg);
        border-right: 1px solid var(--line);
        border-bottom: 1px solid var(--line);
        z-index: 3;
      }

      .ruler-top {
        top: 0;
        left: 28px;
        width: calc(100% - 56px);
        height: 28px;
        border-bottom: 1px solid var(--line);
      }

      .ruler-left {
        top: 28px;
        left: 0;
        width: 28px;
        height: calc(100% - 56px);
        border-right: 1px solid var(--line);
      }

      .ruler-bottom {
        left: 28px;
        width: calc(100% - 56px);
        bottom: 0;
        height: 28px;
        border-top: 1px solid var(--line);
      }

      .ruler-right {
        top: 28px;
        right: 0;
        width: 28px;
        height: calc(100% - 56px);
        border-left: 1px solid var(--line);
      }

      .ruler-corner-bottom-right {
        right: 0;
        bottom: 0;
        width: 28px;
        height: 28px;
        background: var(--ruler-bg);
        border-left: 1px solid var(--line);
        border-top: 1px solid var(--line);
        z-index: 3;
      }

      .ruler-corner-top-right {
        top: 0;
        right: 0;
        width: 28px;
        height: 28px;
        background: var(--ruler-bg);
        border-left: 1px solid var(--line);
        border-bottom: 1px solid var(--line);
        z-index: 3;
      }

      .ruler-corner-bottom-left {
        left: 0;
        bottom: 0;
        width: 28px;
        height: 28px;
        background: var(--ruler-bg);
        border-right: 1px solid var(--line);
        border-top: 1px solid var(--line);
        z-index: 3;
      }

      .canvas-wrap {
        position: absolute;
        top: 28px;
        left: 28px;
        right: 28px;
        bottom: 28px;
        overflow: hidden;
        background: var(--canvas-bg);
      }

      canvas {
        display: block;
      }

      .canvas-wrap canvas {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
      }

      .floating-tools {
        position: absolute;
        right: 18px;
        top: 52px;
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 11;
      }

      .floating-tool {
        display: inline-flex;
        align-items: center;
        justify-content: space-between;
        min-width: 116px;
        padding: 10px 12px;
        font-size: 12px;
        background: var(--floating-surface);
        box-shadow: var(--shadow);
      }

      .floating-tool.active {
        border-color: var(--line-strong);
      }

      .floating-tool-indicator {
        width: 8px;
        height: 8px;
        border-radius: 999px;
        border: 1px solid var(--line-strong);
        background: transparent;
        flex: 0 0 auto;
      }

      .floating-tool.active .floating-tool-indicator {
        background: var(--text);
        border-color: var(--text);
      }

      .tool-panel,
      .menu-panel {
        position: absolute;
        z-index: 12;
        border: 1px solid var(--line);
        border-radius: 16px;
        background: var(--bg-elevated);
        backdrop-filter: blur(18px);
        box-shadow: var(--shadow);
      }

      .tool-panel {
        top: 144px;
        right: 18px;
        width: 220px;
        padding: 12px;
        background: var(--floating-panel);
      }

      .modal-panel {
        position: fixed;
        top: 50%;
        left: 50%;
        width: min(540px, calc(100vw - 40px));
        padding: 18px;
        transform: translate(-50%, -50%);
        z-index: 30;
      }

      .hidden {
        display: none;
      }

      .tool-title,
      .menu-title {
        font-size: 11px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--muted);
      }

      .tool-heading {
        margin-top: 4px;
        font-size: 13px;
        font-weight: 600;
      }

      .tool-fields {
        display: flex;
        flex-direction: column;
        gap: 10px;
        margin-top: 12px;
      }

      .field {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }

      .field label {
        font-size: 11px;
        color: var(--muted);
      }

      .field input,
      .field select {
        width: 100%;
        padding: 8px 10px;
        border-radius: 10px;
        border: 1px solid var(--line);
        background: var(--surface-strong);
        color: inherit;
      }

      .field input[type="range"] {
        padding: 0;
        border: 0;
        border-radius: 0;
        background: transparent;
        appearance: none;
        -webkit-appearance: none;
      }

      .field input[type="range"]::-webkit-slider-runnable-track {
        height: 4px;
        border-radius: 999px;
        background: var(--line-strong);
      }

      .field input[type="range"]::-webkit-slider-thumb {
        width: 12px;
        height: 12px;
        margin-top: -4px;
        border: 0;
        border-radius: 50%;
        background: var(--text);
        appearance: none;
        -webkit-appearance: none;
        box-shadow: 0 0 0 1px rgba(0, 0, 0, 0.08);
      }

      .field input[type="range"]::-moz-range-track {
        height: 4px;
        border: 0;
        border-radius: 999px;
        background: var(--line-strong);
      }

      .field input[type="range"]::-moz-range-thumb {
        width: 12px;
        height: 12px;
        border: 0;
        border-radius: 50%;
        background: var(--text);
        box-shadow: 0 0 0 1px rgba(0, 0, 0, 0.08);
      }

      .scene-card .field input[type="range"] {
        max-width: 132px;
      }

      .layer-stack-card .field input[type="range"] {
        max-width: 132px;
      }

      .dimension-row {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px;
      }

      .tool-chips {
        display: flex;
        gap: 8px;
        margin-top: 10px;
      }

      .tool-chip {
        padding: 7px 10px;
        font-size: 11px;
      }

      .status-pill {
        position: absolute;
        left: 50%;
        bottom: 18px;
        transform: translateX(-50%);
        padding: 8px 12px;
        border-radius: 999px;
        border: 1px solid var(--line);
        background: var(--bg-elevated);
        box-shadow: var(--shadow);
        font-size: 11px;
        color: var(--muted);
        z-index: 11;
      }

      .modal-backdrop {
        position: fixed;
        inset: 0;
        background: rgba(10, 14, 18, 0.08);
        z-index: 29;
      }

      .menu-actions {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        justify-content: flex-end;
      }

      .menu-section + .menu-section {
        margin-top: 14px;
        padding-top: 14px;
        border-top: 1px solid var(--line);
      }

      .menu-section {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
      }

      .mode-button {
        padding: 9px 10px;
        text-align: center;
        font-size: 12px;
        white-space: nowrap;
      }

      .mode-button.active {
        background: var(--accent-soft);
        border-color: var(--line-strong);
      }

      .calibration-modal {
        width: min(360px, calc(100vw - 40px));
      }

      .calibration-actions {
        display: flex;
        justify-content: flex-end;
        gap: 8px;
        margin-top: 14px;
      }

      @media (max-width: 900px) {
        .workspace {
          grid-template-columns: 1fr;
        }

        .layers-panel {
          width: 240px;
          position: absolute;
          inset: 0 auto 0 0;
          height: auto;
          box-shadow: var(--shadow);
          border-right: 1px solid var(--line);
        }

        .floating-tool {
          min-width: 96px;
        }

        .menu-section {
          flex-direction: column;
          align-items: stretch;
        }

        .menu-actions {
          justify-content: flex-start;
        }
      }
    </style>
  </head>
  <body>
    <div class="app">
      <header class="topbar">
        <div class="brand">
          <div class="brand-name">millimétré</div>
        </div>
        <div class="separator"></div>
        <div class="toolbar-actions">
          <button class="ghost-button stub" id="undoButton">Undo</button>
          <button class="ghost-button stub" id="redoButton">Redo</button>
          <button class="ghost-button" id="settingsButton">Settings</button>
          <button class="ghost-button stub" id="exportButton">Export</button>
          <button class="ghost-button stub" id="importButton">Import</button>
        </div>
      </header>

      <main class="workspace">
        <aside class="layers-panel" id="layersPanel">
          <div class="layers-body">
            <div class="panel-section">
              <div class="section-header">
                <div class="section-header-left">
                  <div class="section-header-title">Scenes</div>
                </div>
                <button class="section-header-action" id="sceneAddButton" aria-label="Import scene image"></button>
              </div>
              <div class="scene-list" id="sceneList"></div>
              <div class="empty-state hidden" id="sceneEmptyState"></div>
            </div>
            <div class="panel-section">
              <div class="section-header">
                <div class="section-header-left">
                  <div class="section-header-title">Layers</div>
                </div>
                <button class="section-header-action" id="addLayerButton" aria-label="Add layer"></button>
              </div>
            </div>
            <div class="layer-list" id="layerList"></div>
          </div>
        </aside>
        <input id="sceneImportInput" type="file" accept="image/*" hidden />

        <div class="menu-panel modal-panel hidden" id="settingsMenu">
          <div class="menu-section">
            <div class="menu-title">Appearance</div>
            <div class="menu-actions">
              <button class="mode-button active" data-theme="light">Light mode</button>
              <button class="mode-button" data-theme="dark">Dark mode</button>
            </div>
          </div>
          <div class="menu-section">
            <div class="menu-title">Grid Position</div>
            <div class="menu-actions">
              <button class="mode-button active" data-grid-position="below">Below layers</button>
              <button class="mode-button" data-grid-position="above">Above layers</button>
            </div>
          </div>
          <div class="menu-section">
            <div class="menu-title">Dual Stroke Grid</div>
            <div class="menu-actions">
              <button class="mode-button active" data-dual-grid="off">Off</button>
              <button class="mode-button" data-dual-grid="on">On</button>
            </div>
          </div>
        </div>
        <div class="menu-panel modal-panel calibration-modal hidden" id="sceneScaleModal">
          <div class="menu-title">Scene Scale</div>
          <div class="tool-heading">Calibrate from two points</div>
          <div class="tool-fields">
            <div class="field">
              <label for="sceneScaleMeters">Real distance in meters</label>
              <input id="sceneScaleMeters" type="number" min="0.01" step="0.01" value="1" />
            </div>
          </div>
          <div class="calibration-actions">
            <button class="ghost-button" id="sceneScaleCancelButton">Cancel</button>
            <button class="ghost-button" id="sceneScaleApplyButton">Apply</button>
          </div>
        </div>
        <div class="modal-backdrop hidden" id="modalBackdrop"></div>

        <div class="canvas-shell">
          <div class="ruler-corner"></div>
          <div class="ruler-corner-top-right"></div>
          <div class="ruler-corner-bottom-left"></div>
          <canvas class="ruler-top" id="rulerTop"></canvas>
          <canvas class="ruler-left" id="rulerLeft"></canvas>
          <canvas class="ruler-bottom" id="rulerBottom"></canvas>
          <canvas class="ruler-right" id="rulerRight"></canvas>
          <div class="ruler-corner-bottom-right"></div>
          <div class="canvas-wrap">
            <canvas id="staticCanvas"></canvas>
            <canvas id="sceneCanvas"></canvas>
            <canvas id="contentCanvas"></canvas>
            <canvas id="overlayCanvas"></canvas>
          </div>
        </div>

        <div class="floating-tools">
          <button class="floating-tool active" id="selectionToolButton">
            <span>Selection</span>
            <span class="floating-tool-indicator"></span>
          </button>
          <button class="floating-tool" id="brushToolButton">
            <span>Brush</span>
            <span class="floating-tool-indicator"></span>
          </button>
        </div>

        <div class="tool-panel hidden" id="brushPanel">
          <div class="tool-title">Brush Settings</div>
          <div class="tool-heading">Cell painter</div>
          <div class="tool-fields">
            <div class="field">
              <label for="brushColor">Color</label>
              <input id="brushColor" type="color" value="#111827" />
            </div>
            <div class="dimension-row">
              <div class="field">
                <label for="brushWidth">Width cells</label>
                <input id="brushWidth" type="number" min="1" max="12" value="1" />
              </div>
              <div class="field">
                <label for="brushHeight">Height cells</label>
                <input id="brushHeight" type="number" min="1" max="12" value="1" />
              </div>
            </div>
          </div>
          <div class="tool-chips">
            <button class="tool-chip" data-size="1x1">1 x 1</button>
            <button class="tool-chip" data-size="2x2">2 x 2</button>
            <button class="tool-chip" data-size="4x2">4 x 2</button>
          </div>
        </div>

        <div class="status-pill" id="statusPill">
          Esc switches to Selection. Left click paints, right click erases, wheel zooms, space + drag pans.
        </div>
      </main>
    </div>

    <script>
      const CELL_SIZE = 20;
      const CENTIMETERS_PER_CELL = 5;
      const CELLS_PER_METER = 100 / CENTIMETERS_PER_CELL;
      const CELLS_PER_HALF_METER = 50 / CENTIMETERS_PER_CELL;
      const TILE_SIZE = 32;
      const MIN_ZOOM = 0.12;
      const MAX_ZOOM = 3.6;
      const DEFAULT_COLOR = "#111827";

      const ui = {
        body: document.body,
        staticCanvas: document.getElementById("staticCanvas"),
        sceneCanvas: document.getElementById("sceneCanvas"),
        contentCanvas: document.getElementById("contentCanvas"),
        overlayCanvas: document.getElementById("overlayCanvas"),
        rulerTop: document.getElementById("rulerTop"),
        rulerLeft: document.getElementById("rulerLeft"),
        rulerBottom: document.getElementById("rulerBottom"),
        rulerRight: document.getElementById("rulerRight"),
        layersPanel: document.getElementById("layersPanel"),
        sceneAddButton: document.getElementById("sceneAddButton"),
        sceneImportInput: document.getElementById("sceneImportInput"),
        sceneList: document.getElementById("sceneList"),
        sceneEmptyState: document.getElementById("sceneEmptyState"),
        layerList: document.getElementById("layerList"),
        addLayerButton: document.getElementById("addLayerButton"),
        settingsButton: document.getElementById("settingsButton"),
        settingsMenu: document.getElementById("settingsMenu"),
        sceneScaleModal: document.getElementById("sceneScaleModal"),
        sceneScaleMeters: document.getElementById("sceneScaleMeters"),
        sceneScaleCancelButton: document.getElementById("sceneScaleCancelButton"),
        sceneScaleApplyButton: document.getElementById("sceneScaleApplyButton"),
        modalBackdrop: document.getElementById("modalBackdrop"),
        themeButtons: Array.from(document.querySelectorAll("[data-theme]")),
        gridPositionButtons: Array.from(document.querySelectorAll("[data-grid-position]")),
        dualGridButtons: Array.from(document.querySelectorAll("[data-dual-grid]")),
        selectionToolButton: document.getElementById("selectionToolButton"),
        brushToolButton: document.getElementById("brushToolButton"),
        brushPanel: document.getElementById("brushPanel"),
        brushColor: document.getElementById("brushColor"),
        brushWidth: document.getElementById("brushWidth"),
        brushHeight: document.getElementById("brushHeight"),
        sizeChips: Array.from(document.querySelectorAll(".tool-chip")),
        statusPill: document.getElementById("statusPill"),
      };

      const staticCtx = ui.staticCanvas.getContext("2d");
      const sceneCtx = ui.sceneCanvas.getContext("2d");
      const contentCtx = ui.contentCanvas.getContext("2d");
      const overlayCtx = ui.overlayCanvas.getContext("2d");
      const rulerTopCtx = ui.rulerTop.getContext("2d");
      const rulerLeftCtx = ui.rulerLeft.getContext("2d");
      const rulerBottomCtx = ui.rulerBottom.getContext("2d");
      const rulerRightCtx = ui.rulerRight.getContext("2d");

      const state = {
        theme: "light",
        activeTool: "brush",
        panelCollapsed: false,
        viewport: {
          x: window.innerWidth / 2 - 200,
          y: window.innerHeight / 2 - 200,
          zoom: 1,
        },
        pointer: {
          clientX: 0,
          clientY: 0,
          inside: false,
        },
        brush: {
          color: DEFAULT_COLOR,
          width: 1,
          height: 1,
        },
        nextSceneNumber: 1,
        scenes: [],
        activeSceneId: null,
        editingSceneId: null,
        dragSceneId: null,
        sceneCalibration: null,
        gridPosition: "below",
        dualStrokeGrid: false,
        layers: [createLayer("Layer 1")],
        activeLayerId: null,
        editingLayerId: null,
        dragLayerId: null,
        interaction: null,
        spacePan: false,
        renderState: {
          frame: 0,
          uiDirty: true,
          staticDirty: true,
          scenesDirty: true,
          contentDirty: true,
          overlayDirty: true,
          rulersDirty: true,
        },
      };

      state.activeLayerId = state.layers[0].id;

      function createLayer(name) {
        return {
          id: "layer-" + Math.random().toString(36).slice(2, 10),
          name,
          visible: true,
          opacity: 1,
          tiles: {},
          cellCount: 0,
        };
      }

      function createTile(layer, tileX, tileY) {
        const canvas = document.createElement("canvas");
        canvas.width = TILE_SIZE;
        canvas.height = TILE_SIZE;
        const tileCtx = canvas.getContext("2d");
        tileCtx.imageSmoothingEnabled = false;
        const tile = {
          id: tileKey(tileX, tileY),
          tileX,
          tileY,
          pixels: new Map(),
          canvas,
          ctx: tileCtx,
          dirty: true,
        };
        layer.tiles[tile.id] = tile;
        return tile;
      }

      function tileKey(tileX, tileY) {
        return tileX + ":" + tileY;
      }

      function localKey(localX, localY) {
        return localX + ":" + localY;
      }

      function activeLayer() {
        return state.layers.find((layer) => layer.id === state.activeLayerId) || null;
      }

      function activeScene() {
        return state.scenes.find((scene) => scene.id === state.activeSceneId) || null;
      }

      function getTileCoords(cellX, cellY) {
        return {
          tileX: Math.floor(cellX / TILE_SIZE),
          tileY: Math.floor(cellY / TILE_SIZE),
        };
      }

      function getLocalCoords(cellX, cellY, tileX, tileY) {
        return {
          x: cellX - tileX * TILE_SIZE,
          y: cellY - tileY * TILE_SIZE,
        };
      }

      function getTile(layer, cellX, cellY, createIfMissing) {
        const coords = getTileCoords(cellX, cellY);
        const key = tileKey(coords.tileX, coords.tileY);
        return layer.tiles[key] || (createIfMissing ? createTile(layer, coords.tileX, coords.tileY) : null);
      }

      function getCellColor(layer, cellX, cellY) {
        const tile = getTile(layer, cellX, cellY, false);
        if (!tile) return null;
        const coords = getTileCoords(cellX, cellY);
        const local = getLocalCoords(cellX, cellY, coords.tileX, coords.tileY);
        return tile.pixels.get(localKey(local.x, local.y)) || null;
      }

      function setCellColor(layer, cellX, cellY, color) {
        const coords = getTileCoords(cellX, cellY);
        const tile = getTile(layer, cellX, cellY, !!color);
        if (!tile) return false;

        const local = getLocalCoords(cellX, cellY, coords.tileX, coords.tileY);
        const key = localKey(local.x, local.y);
        const previous = tile.pixels.get(key);

        if (color) {
          if (previous === color) return false;
          if (!previous) layer.cellCount += 1;
          tile.pixels.set(key, color);
          tile.dirty = true;
          return true;
        }

        if (!previous) return false;
        tile.pixels.delete(key);
        layer.cellCount -= 1;
        if (!tile.pixels.size) {
          delete layer.tiles[tile.id];
          return true;
        }
        tile.dirty = true;
        return true;
      }

      function redrawTile(tile) {
        if (!tile.dirty) return;
        tile.ctx.clearRect(0, 0, TILE_SIZE, TILE_SIZE);
        tile.pixels.forEach((color, key) => {
          const [x, y] = key.split(":").map(Number);
          tile.ctx.fillStyle = color;
          tile.ctx.fillRect(x, y, 1, 1);
        });
        tile.dirty = false;
      }

      function worldFromClient(clientX, clientY) {
        const rect = ui.overlayCanvas.getBoundingClientRect();
        const screenX = clientX - rect.left;
        const screenY = clientY - rect.top;
        return {
          screenX,
          screenY,
          worldX: (screenX - state.viewport.x) / state.viewport.zoom,
          worldY: (screenY - state.viewport.y) / state.viewport.zoom,
        };
      }

      function cellFromWorld(worldX, worldY) {
        return {
          x: Math.floor(worldX / CELL_SIZE),
          y: Math.floor(worldY / CELL_SIZE),
        };
      }

      function brushOriginFromCell(cellX, cellY) {
        return {
          x: cellX - Math.floor((state.brush.width - 1) / 2),
          y: cellY - Math.floor((state.brush.height - 1) / 2),
        };
      }

      function setActiveLayerById(layerId) {
        const layer = state.layers.find((entry) => entry.id === layerId);
        if (!layer) return false;
        cancelSceneCalibration();
        state.activeLayerId = layer.id;
        state.activeSceneId = null;
        state.activeTool = "brush";
        return true;
      }

      function setActiveSceneById(sceneId) {
        const scene = state.scenes.find((entry) => entry.id === sceneId);
        if (!scene) return false;
        state.activeSceneId = scene.id;
        state.activeLayerId = null;
        state.activeTool = "transform";
        return true;
      }

      function clearActiveTarget() {
        cancelSceneCalibration();
        state.activeLayerId = null;
        state.activeSceneId = null;
        state.editingLayerId = null;
        state.editingSceneId = null;
        state.activeTool = "select";
      }

      function toggleLayerActivation(layerId) {
        if (state.activeLayerId === layerId && !state.activeSceneId) {
          state.editingLayerId = null;
          state.editingSceneId = null;
          clearActiveTarget();
          setStatus("Selection tool active.");
          render({ ui: true, overlay: true });
          return;
        }
        if (setActiveLayerById(layerId)) {
          state.editingLayerId = null;
          state.editingSceneId = null;
          setStatus("Brush active on selected layer.");
          render({ ui: true, overlay: true });
        }
      }

      function beginRenameLayer(layerId) {
        state.editingLayerId = layerId;
        state.editingSceneId = null;
        render({ ui: true });
      }

      function endRenameLayer() {
        state.editingLayerId = null;
        render({ ui: true });
      }

      function toggleSceneActivation(sceneId) {
        if (state.activeSceneId === sceneId && !state.activeLayerId) {
          state.editingSceneId = null;
          state.editingLayerId = null;
          clearActiveTarget();
          setStatus("Selection tool active.");
          render({ ui: true, overlay: true });
          return;
        }
        if (setActiveSceneById(sceneId)) {
          state.editingSceneId = null;
          state.editingLayerId = null;
          setStatus("Transform active on selected scene.");
          render({ ui: true, overlay: true });
        }
      }

      function beginRenameScene(sceneId) {
        state.editingSceneId = sceneId;
        state.editingLayerId = null;
        render({ ui: true });
      }

      function endRenameScene() {
        state.editingSceneId = null;
        render({ ui: true });
      }

      function isEditingName() {
        return !!(state.editingLayerId || state.editingSceneId);
      }

      function cancelRenameMode() {
        if (!isEditingName()) return false;
        state.editingLayerId = null;
        state.editingSceneId = null;
        render({ ui: true });
        return true;
      }

      function sceneWorldPoint(scene, localX, localY) {
        const center = sceneCenter(scene);
        const rotated = rotatePoint(localX, localY, scene.rotation || 0);
        return {
          x: center.x + rotated.x,
          y: center.y + rotated.y,
        };
      }

      function worldUnitsFromMeters(meters) {
        return meters * CELLS_PER_METER * CELL_SIZE;
      }

      function cancelSceneCalibration() {
        if (!state.sceneCalibration) return false;
        state.sceneCalibration = null;
        if (isModalOpen(ui.sceneScaleModal)) {
          closeModal(ui.sceneScaleModal);
        }
        return true;
      }

      function startSceneCalibration(sceneId) {
        if (!setActiveSceneById(sceneId)) return;
        state.sceneCalibration = {
          sceneId,
          points: [],
        };
        if (isModalOpen(ui.sceneScaleModal)) {
          closeModal(ui.sceneScaleModal);
        }
        setStatus("Pick the first point on the active scene.");
        render({ ui: true, overlay: true });
      }

      function applySceneCalibration() {
        const calibration = state.sceneCalibration;
        if (!calibration || calibration.points.length < 2) return;
        const scene = state.scenes.find((entry) => entry.id === calibration.sceneId);
        if (!scene) return;
        const meters = Number(ui.sceneScaleMeters.value);
        if (!Number.isFinite(meters) || meters <= 0) {
          setStatus("Enter a valid distance in meters.");
          ui.sceneScaleMeters.focus();
          ui.sceneScaleMeters.select();
          return;
        }

        const [pointA, pointB] = calibration.points;
        const currentDistance = Math.hypot(pointB.localX - pointA.localX, pointB.localY - pointA.localY);
        const targetDistance = worldUnitsFromMeters(meters);
        if (currentDistance <= 0 || targetDistance <= 0) {
          setStatus("Could not compute scene scale.");
          return;
        }

        const factor = targetDistance / currentDistance;
        const center = sceneCenter(scene);
        scene.width = Math.max(CELL_SIZE, scene.width * factor);
        scene.height = Math.max(CELL_SIZE, scene.height * factor);
        scene.x = center.x - scene.width / 2;
        scene.y = center.y - scene.height / 2;
        state.sceneCalibration = null;
        closeModal(ui.sceneScaleModal);
        setStatus("Scene scaled from measured distance.");
        render({ ui: true, scenes: true, overlay: true });
      }

      function collectSceneCalibrationPoint(clientX, clientY) {
        const calibration = state.sceneCalibration;
        if (!calibration) return false;
        const scene = state.scenes.find((entry) => entry.id === calibration.sceneId);
        if (!scene || !scene.visible) return false;
        const pointer = worldFromClient(clientX, clientY);
        if (!pointInScene(scene, pointer.worldX, pointer.worldY)) {
          setStatus("Click inside the active scene to set the calibration point.");
          return true;
        }

        const local = sceneLocalPoint(scene, pointer.worldX, pointer.worldY);
        if (calibration.points.length === 0) {
          calibration.points.push({ localX: local.x, localY: local.y });
          setStatus("Pick the second point on the active scene.");
          render({ overlay: true });
          return true;
        }

        calibration.points[1] = { localX: local.x, localY: local.y };
        ui.sceneScaleMeters.value = "1";
        openModal(ui.sceneScaleModal);
        queueMicrotask(() => {
          ui.sceneScaleMeters.focus();
          ui.sceneScaleMeters.select();
        });
        setStatus("Enter the real-world distance in meters.");
        render({ overlay: true });
        return true;
      }

      function strokeSceneLine(context, x1, y1, x2, y2, lineWidth, strokeColor, dualStrokeColor) {
        if (state.dualStrokeGrid) {
          context.beginPath();
          context.moveTo(x1, y1);
          context.lineTo(x2, y2);
          context.strokeStyle = dualStrokeColor;
          context.lineWidth = lineWidth * 1.2;
          context.stroke();
        }

        context.beginPath();
        context.moveTo(x1, y1);
        context.lineTo(x2, y2);
        context.strokeStyle = strokeColor;
        context.lineWidth = lineWidth;
        context.stroke();
      }

      function normalizeAngle(angle) {
        while (angle > Math.PI) angle -= Math.PI * 2;
        while (angle < -Math.PI) angle += Math.PI * 2;
        return angle;
      }

      function snapAngleToQuarterTurn(angle) {
        const quarterTurn = Math.PI / 2;
        const snapTarget = Math.round(angle / quarterTurn) * quarterTurn;
        const snapWindow = Math.PI / 36;
        return Math.abs(normalizeAngle(angle - snapTarget)) <= snapWindow ? normalizeAngle(snapTarget) : normalizeAngle(angle);
      }

      function worldToScreen(worldX, worldY) {
        return {
          x: state.viewport.x + worldX * state.viewport.zoom,
          y: state.viewport.y + worldY * state.viewport.zoom,
        };
      }

      function screenToWorld(screenX, screenY) {
        return {
          x: (screenX - state.viewport.x) / state.viewport.zoom,
          y: (screenY - state.viewport.y) / state.viewport.zoom,
        };
      }

      function rotatePoint(x, y, angle) {
        const cos = Math.cos(angle);
        const sin = Math.sin(angle);
        return {
          x: x * cos - y * sin,
          y: x * sin + y * cos,
        };
      }

      function sceneCenter(scene) {
        return {
          x: scene.x + scene.width / 2,
          y: scene.y + scene.height / 2,
        };
      }

      function sceneCornerPoints(scene) {
        const center = sceneCenter(scene);
        const halfWidth = scene.width / 2;
        const halfHeight = scene.height / 2;
        return {
          topLeft: rotatePoint(-halfWidth, -halfHeight, scene.rotation || 0),
          topRight: rotatePoint(halfWidth, -halfHeight, scene.rotation || 0),
          bottomRight: rotatePoint(halfWidth, halfHeight, scene.rotation || 0),
          bottomLeft: rotatePoint(-halfWidth, halfHeight, scene.rotation || 0),
          center,
        };
      }

      function sceneLocalPoint(scene, worldX, worldY) {
        const center = sceneCenter(scene);
        return rotatePoint(worldX - center.x, worldY - center.y, -(scene.rotation || 0));
      }

      function pointInScene(scene, worldX, worldY) {
        const local = sceneLocalPoint(scene, worldX, worldY);
        return Math.abs(local.x) <= scene.width / 2 && Math.abs(local.y) <= scene.height / 2;
      }

      function topSceneAt(worldX, worldY) {
        for (const scene of state.scenes) {
          if (!scene.visible) continue;
          if (pointInScene(scene, worldX, worldY)) return scene;
        }
        return null;
      }

      function sceneHandleWorldPositions(scene) {
        const center = sceneCenter(scene);
        const halfWidth = scene.width / 2;
        const halfHeight = scene.height / 2;
        const rotation = scene.rotation || 0;
        const corners = {
          nw: rotatePoint(-halfWidth, -halfHeight, rotation),
          ne: rotatePoint(halfWidth, -halfHeight, rotation),
          se: rotatePoint(halfWidth, halfHeight, rotation),
          sw: rotatePoint(-halfWidth, halfHeight, rotation),
        };
        const rotateOffset = 28 / state.viewport.zoom;
        const rotateHandle = rotatePoint(0, -halfHeight - rotateOffset, rotation);
        return {
          nw: { x: center.x + corners.nw.x, y: center.y + corners.nw.y },
          ne: { x: center.x + corners.ne.x, y: center.y + corners.ne.y },
          se: { x: center.x + corners.se.x, y: center.y + corners.se.y },
          sw: { x: center.x + corners.sw.x, y: center.y + corners.sw.y },
          rotate: { x: center.x + rotateHandle.x, y: center.y + rotateHandle.y },
          center,
        };
      }

      function sceneTransformHit(scene, worldX, worldY) {
        const handles = sceneHandleWorldPositions(scene);
        const radius = 10 / state.viewport.zoom;
        for (const key of ["rotate", "nw", "ne", "se", "sw"]) {
          const handle = handles[key];
          const dx = worldX - handle.x;
          const dy = worldY - handle.y;
          if (Math.hypot(dx, dy) <= radius) return { type: key === "rotate" ? "rotate" : "scale", handle: key };
        }
        if (pointInScene(scene, worldX, worldY)) return { type: "move", handle: null };
        return null;
      }

      function cursorForSceneHit(hit) {
        if (!hit) return "default";
        if (hit.type === "rotate") return "grab";
        if (hit.type === "move") return "move";
        return "nwse-resize";
      }

      function setStatus(message) {
        ui.statusPill.textContent = message;
      }

      function setCardDragPreview(event, card) {
        if (!event.dataTransfer || !card) return;
        const preview = card.cloneNode(true);
        preview.style.position = "fixed";
        preview.style.top = "-9999px";
        preview.style.left = "-9999px";
        preview.style.width = card.getBoundingClientRect().width + "px";
        preview.style.pointerEvents = "none";
        preview.style.opacity = "0.96";
        preview.style.transform = "rotate(1.5deg)";
        preview.style.boxShadow = getCssVar("--shadow");
        preview.classList.remove("dragging");
        document.body.appendChild(preview);
        event.dataTransfer.setDragImage(preview, 24, 18);
        requestAnimationFrame(() => preview.remove());
      }

      function isModalOpen(modal) {
        return !modal.classList.contains("hidden");
      }

      function closeModal(modal) {
        modal.classList.add("hidden");
        ui.modalBackdrop.classList.add("hidden");
        if (modal === ui.settingsMenu) {
          ui.settingsButton.classList.remove("active");
        }
      }

      function openModal(modal) {
        ui.settingsMenu.classList.add("hidden");
        ui.sceneScaleModal.classList.add("hidden");
        modal.classList.remove("hidden");
        ui.modalBackdrop.classList.remove("hidden");
        if (modal === ui.settingsMenu) {
          ui.settingsButton.classList.add("active");
        }
      }

      function toggleModal(modal) {
        if (isModalOpen(modal)) {
          closeModal(modal);
          return;
        }
        openModal(modal);
      }

      function closeActiveModal() {
        if (isModalOpen(ui.settingsMenu)) {
          closeModal(ui.settingsMenu);
          return true;
        }
        if (isModalOpen(ui.sceneScaleModal)) {
          closeModal(ui.sceneScaleModal);
          cancelSceneCalibration();
          setStatus("Scene scale setup cancelled.");
          render({ overlay: true });
          return true;
        }
        return false;
      }

      function render(flags) {
        const full = !flags;
        state.renderState.uiDirty = state.renderState.uiDirty || full || !!flags.ui;
        state.renderState.staticDirty = state.renderState.staticDirty || full || !!flags.static;
        state.renderState.scenesDirty = state.renderState.scenesDirty || full || !!flags.scenes;
        state.renderState.contentDirty = state.renderState.contentDirty || full || !!flags.content;
        state.renderState.overlayDirty = state.renderState.overlayDirty || full || !!flags.overlay;
        state.renderState.rulersDirty = state.renderState.rulersDirty || full || !!flags.rulers;
        if (state.renderState.frame) return;
        state.renderState.frame = window.requestAnimationFrame(flushRender);
      }

      function flushRender() {
        state.renderState.frame = 0;
        ui.body.classList.toggle("theme-dark", state.theme === "dark");

        if (state.renderState.uiDirty) {
          updateThemeButtons();
          renderToolState();
          renderScenes();
          renderLayers();
          ui.staticCanvas.style.zIndex = state.gridPosition === "above" ? "3" : "0";
          ui.sceneCanvas.style.zIndex = "1";
          ui.contentCanvas.style.zIndex = "2";
          ui.overlayCanvas.style.zIndex = "4";
          ui.layersPanel.classList.toggle("collapsed", state.panelCollapsed);
          ui.brushColor.value = state.brush.color;
          ui.brushWidth.value = state.brush.width;
          ui.brushHeight.value = state.brush.height;
          state.renderState.uiDirty = false;
        }

        if (state.renderState.staticDirty) {
          drawStaticScene();
          state.renderState.staticDirty = false;
        }

        if (state.renderState.scenesDirty) {
          drawSceneScene();
          state.renderState.scenesDirty = false;
        }

        if (state.renderState.contentDirty) {
          drawContentScene();
          state.renderState.contentDirty = false;
        }

        if (state.renderState.overlayDirty) {
          drawOverlayScene();
          state.renderState.overlayDirty = false;
        }

        if (state.renderState.rulersDirty) {
          drawRulers();
          state.renderState.rulersDirty = false;
        }
      }

      function updateThemeButtons() {
        ui.themeButtons.forEach((button) => {
          button.classList.toggle("active", button.dataset.theme === state.theme);
        });
        ui.gridPositionButtons.forEach((button) => {
          button.classList.toggle("active", button.dataset.gridPosition === state.gridPosition);
        });
        ui.dualGridButtons.forEach((button) => {
          button.classList.toggle("active", button.dataset.dualGrid === (state.dualStrokeGrid ? "on" : "off"));
        });
      }

      function renderToolState() {
        ui.selectionToolButton.classList.toggle("active", state.activeTool === "select");
        ui.brushToolButton.classList.toggle("active", state.activeTool === "brush");
        ui.brushPanel.classList.toggle("hidden", state.activeTool !== "brush");
        ui.overlayCanvas.style.cursor = state.activeTool === "brush" ? "crosshair" : state.activeTool === "transform" ? "move" : "default";
      }

      function renderLayers() {
        ui.layerList.innerHTML = "";
        state.layers.forEach((layer) => {
          const card = document.createElement("div");
          card.className = "layer-card layer-stack-card" + (layer.id === state.activeLayerId ? " active" : "");
          if (layer.id === state.dragLayerId) card.classList.add("dragging");

          const grip = document.createElement("div");
          grip.className = "drag-handle";
          grip.textContent = "⋮⋮";
